<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="mega-blade.io">
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#53a548"/>
      <stop offset="1" stop-color="#4c934c"/>
    </linearGradient>
    <!-- carve a clean GAP at the top of the leaf (like the break in a power ring) -->
    <mask id="gap">
      <rect width="48" height="48" fill="white"/>
      <rect x="19.5" y="0" width="9" height="17" fill="black"/>
    </mask>
  </defs>

  <!-- leaf body as the "ring": broken open at the top by the mask -->
  <path d="M24 6 C12 15 12 34 24 44 C36 34 36 15 24 6 Z"
        fill="url(#lg)" mask="url(#gap)"/>

  <!-- power line: short stub through the gap, like the bar in a power glyph -->
  <line x1="24" y1="3" x2="24" y2="21"
        stroke="#14342b" stroke-width="4.6" stroke-linecap="round"/>
</svg>
